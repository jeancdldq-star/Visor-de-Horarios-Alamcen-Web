<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador Diario de Turnos</title>
    
    <!-- AQUÍ CAMBIAS EL EMOJI DE LA PESTAÑA DEL NAVEGADOR (Cambia el 📋 por el que quieras) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    
    <!-- Cargamos SheetJS para leer el Excel en el navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* --- ESTILOS GENERALES Y SIMULACIÓN DE PAPEL --- */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .app-container {
            width: 98%;
            max-width: none; 
            margin: 0 auto;
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-height: 85vh;
        }
        h1 { text-align: center; color: #333; margin-bottom: 5px; }
        .instrucciones { text-align: center; color: #666; font-size: 16px; margin-bottom: 25px; }

        /* --- CONTROLES --- */
        .controles {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        select {
            padding: 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            width: 220px;
        }
        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { background: #aaa !important; cursor: not-allowed; }
        .btn-cargar { background-color: #4CAF50; }
        .btn-imprimir { background-color: #2196F3; }
        
        /* Ocultar input file original */
        input[type="file"] { display: none; }

        /* --- VISTA DE HORARIOS --- */
        #contenedor-horarios {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 25px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        .bloque-hora {
            background: white;
            padding: 10px;
            break-inside: avoid;
        }
        .hora-titulo {
            background-color: #CCFF00 !important;
            color: black;
            font-size: 18px;
            font-weight: bold;
            padding: 5px 10px;
            display: inline-block;
            border-bottom: 2px solid black;
            min-width: 150px;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        
        /* CAMBIO DEFINITIVO: Diseño flexible para que nunca salte de línea la hora ni la tarea */
        .fila-turno {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 4px 2px;
            color: #000080;
            font-size: 14px;
            font-style: italic;
            margin-top: 5px;
        }
        .col-nombre { 
            flex: 1; /* Ocupa todo el espacio sobrante */
            word-break: break-word; /* Si el nombre es súper largo, salta de línea */
        }
        .col-fin { 
            white-space: nowrap; /* Prohíbe salto de línea */
            font-weight: bold; 
            flex-shrink: 0; /* Prohíbe encogerse */
        }
        .col-sig { 
            white-space: nowrap; /* Prohíbe salto de línea */
            font-weight: bold; 
            flex-shrink: 0; /* Prohíbe encogerse */
            min-width: 90px; /* Asegura espacio para la flecha */
        }

        /* --- ESTILOS PARA IMPRESIÓN --- */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .app-container { box-shadow: none; padding: 0; width: 100%; max-width: 100%; }
            #contenedor-horarios { display: flex; flex-wrap: wrap; gap: 20px; }
            .bloque-hora { width: 48%; } /* Dos columnas anchas al imprimir */
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="no-print">
        <h1>Organizador Diario de Turnos</h1>
        <div class="instrucciones">Selecciona la sección y sube el Excel de hoy para generar la vista</div>

        <div class="controles">
            <label style="font-weight: bold;">Filtrar por:</label>
            <select id="combo-seccion">
                <option value="CARRUSEL PK ALM.">CARRUSEL PK ALM.</option>
                <option value="CARRUSEL PC ALM.">CARRUSEL PC ALM.</option>
                <option value="DEVOLUCIONES ALM.">DEVOLUCIONES ALM.</option>
                <option value="EXPEDICIONES ALM.">EXPEDICIONES ALM.</option>
            </select>

            <label for="archivo-excel" class="btn btn-cargar" id="lbl-cargar">
                📁 Cargar Archivo Excel
            </label>
            <input type="file" id="archivo-excel" accept=".xlsx, .xls">

            <button class="btn btn-imprimir" id="btn-imprimir" disabled onclick="window.print()">
                🖨️ Imprimir / PDF
            </button>
        </div>
    </div>

    <div id="contenedor-horarios">
        <!-- Aquí se dibujarán los datos con JS -->
    </div>
</div>

<script>
    // --- LÓGICA PRINCIPAL ---

    // Abreviaciones de secciones
    const ABREVIACIONES = {
        "CARRUSEL PC ALM.": "CONF",
        "CARRUSEL PK ALM.": "PAQ",
        "EXPEDICIONES ALM.": "EXP",
        "DEVOLUCIONES ALM.": "DEVO"
    };

    function formatTime(val) {
        if (val === undefined || val === null || val === "") return "";
        if (typeof val === 'number') {
            let totalMinutes = Math.round(val * 24 * 60);
            let h = Math.floor(totalMinutes / 60) % 24;
            let m = totalMinutes % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }
        let s = String(val).trim();
        if (s.includes(' ')) s = s.split(' ').pop();
        let match = s.match(/(\d{1,2}):(\d{2})/);
        if (match) return `${match[1].padStart(2, '0')}:${match[2]}`;
        return s;
    }

    function calcularMinutosLogicos(horaStr) {
        if (!horaStr) return 9999;
        let partes = horaStr.split(':');
        if (partes.length < 2) return 9999;
        let h = parseInt(partes[0]);
        let m = parseInt(partes[1]);
        let hLogica = (h - 6 + 24) % 24; 
        return hLogica * 60 + m;
    }

    document.getElementById('archivo-excel').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const seccionElegida = document.getElementById('combo-seccion').value.trim().toUpperCase();
        const lblCargar = document.getElementById('lbl-cargar');
        const btnImprimir = document.getElementById('btn-imprimir');
        const contenedor = document.getElementById('contenedor-horarios');

        lblCargar.innerHTML = "⏳ Procesando datos...";
        lblCargar.style.pointerEvents = 'none';
        btnImprimir.disabled = true;
        contenedor.innerHTML = "";

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array', cellDates: false});
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                const rawRows = XLSX.utils.sheet_to_json(worksheet, {defval: ""});
                
                const rows = rawRows.map(row => {
                    let newRow = {};
                    for (let key in row) {
                        newRow[key.trim().toLowerCase()] = row[key];
                    }
                    return newRow;
                });

                if (!rows[0].hasOwnProperty('nombre empleado') || !rows[0].hasOwnProperty('hora inicio') || !rows[0].hasOwnProperty('hora fin')) {
                    throw new Error("El Excel debe contener 'nombre empleado', 'hora inicio' y 'hora fin'.");
                }

                let df = rows.map(r => {
                    let horaInicio = formatTime(r['hora inicio']);
                    let horaFin = formatTime(r['hora fin']);
                    let nombre = String(r['nombre empleado']).trim().toUpperCase();
                    let tareaRaw = r['sección tarea'] ? String(r['sección tarea']).trim().toUpperCase() : "";
                    
                    if (tareaRaw === 'NAN' || tareaRaw === 'NAT' || tareaRaw === 'NULL' || tareaRaw === 'NONE') {
                        tareaRaw = "";
                    }

                    return {
                        nombre: nombre,
                        horaInicio: horaInicio,
                        horaFin: horaFin,
                        tarea: tareaRaw,
                        minutosOrden: calcularMinutosLogicos(horaInicio),
                        horaInt: horaInicio ? parseInt(horaInicio.split(':')[0]) : null
                    };
                }).filter(r => r.nombre !== "" && r.horaInicio !== "" && r.horaFin !== "");

                df.sort((a, b) => {
                    if (a.nombre < b.nombre) return -1;
                    if (a.nombre > b.nombre) return 1;
                    return a.minutosOrden - b.minutosOrden;
                });

                df.forEach((r, i) => r.ordenGeneral = i);

                let empDataMap = {};
                df.forEach(r => {
                    if (!empDataMap[r.nombre]) empDataMap[r.nombre] = [];
                    empDataMap[r.nombre].push(r);
                });

                let dfFiltradoFinal = [];

                for (let emp in empDataMap) {
                    let empRows = empDataMap[emp];
                    
                    for (let i = 1; i < empRows.length; i++) {
                        if (empRows[i].tarea === "") empRows[i].tarea = empRows[i-1].tarea;
                    }
                    for (let i = empRows.length - 2; i >= 0; i--) {
                        if (empRows[i].tarea === "") empRows[i].tarea = empRows[i+1].tarea;
                    }

                    if(empRows.length > 0 && empRows[0].tarea !== "") {
                        let bloques = [];
                        let bloqueActual = {
                            nombre: emp,
                            tarea: empRows[0].tarea,
                            horaTurno: empRows[0].horaInt,
                            fin: empRows[0].horaFin,
                            ultimoOrden: empRows[0].ordenGeneral
                        };

                        for (let i = 1; i < empRows.length; i++) {
                            let fila = empRows[i];
                            if (fila.tarea === "") continue;

                            if (fila.tarea === bloqueActual.tarea) {
                                bloqueActual.fin = fila.horaFin;
                                bloqueActual.ultimoOrden = fila.ordenGeneral;
                            } else {
                                bloques.push(bloqueActual);
                                bloqueActual = {
                                    nombre: emp,
                                    tarea: fila.tarea,
                                    horaTurno: fila.horaInt,
                                    fin: fila.horaFin,
                                    ultimoOrden: fila.ordenGeneral
                                };
                            }
                        }
                        bloques.push(bloqueActual);

                        bloques.forEach(b => {
                            if (b.tarea.includes(seccionElegida)) {
                                let tareasFuturas = empRows.filter(r => r.ordenGeneral > b.ultimoOrden && !r.tarea.includes(seccionElegida) && r.tarea !== "");
                                
                                let sigStr = "FIN TURNO";
                                if (tareasFuturas.length > 0) {
                                    let rawSig = tareasFuturas[0].tarea;
                                    sigStr = ABREVIACIONES[rawSig] || rawSig;
                                }

                                dfFiltradoFinal.push({
                                    nombre: b.nombre,
                                    horaTurno: b.horaTurno,
                                    fin: b.fin,
                                    sig: sigStr
                                });
                            }
                        });
                    }
                }

                if (dfFiltradoFinal.length === 0) {
                    alert(`No se encontró a nadie en la sección:\n${seccionElegida}`);
                    restaurarBoton();
                    return;
                }

                let turnos = {};
                dfFiltradoFinal.forEach(r => {
                    let h = r.horaTurno;
                    if (!turnos[h]) turnos[h] = [];
                    turnos[h].push(r);
                });

                let horasOrdenadas = Object.keys(turnos).map(Number).sort((a, b) => {
                    let valA = (a - 6 + 24) % 24;
                    let valB = (b - 6 + 24) % 24;
                    return valA - valB;
                });

                // Convertimos el diccionario a variable global para usarlo en el PDF/Impresión
                window.turnosActualesImpresion = { horas: horasOrdenadas, turnos: turnos };

                horasOrdenadas.forEach(hora => {
                    let listaDatos = turnos[hora];
                    
                    listaDatos.sort((a, b) => {
                        let finA = calcularMinutosLogicos(a.fin);
                        let finB = calcularMinutosLogicos(b.fin);
                        if (finA !== finB) return finA - finB;
                        if (a.sig !== b.sig) return a.sig.localeCompare(b.sig);
                        return a.nombre.localeCompare(b.nombre);
                    });

                    let divBloque = document.createElement('div');
                    divBloque.className = 'bloque-hora';
                    
                    let sigHtml = '';
                    listaDatos.forEach(d => {
                        let textoSig = d.sig !== "FIN TURNO" ? `👉 Sig: ${d.sig}` : "";
                        sigHtml += `
                            <div class="fila-turno">
                                <div class="col-nombre">🔸 ${d.nombre}</div>
                                <div class="col-fin">Fin: ${d.fin}</div>
                                <div class="col-sig">${textoSig}</div>
                            </div>
                        `;
                    });

                    divBloque.innerHTML = `
                        <div class="hora-titulo">${hora} H (${listaDatos.length} pers.)</div>
                        <div style="margin-top: 10px;">${sigHtml}</div>
                    `;
                    
                    contenedor.appendChild(divBloque);
                });

                btnImprimir.disabled = false;
                restaurarBoton();

            } catch (err) {
                console.error(err);
                alert("Ocurrió un problema al leer el archivo:\n" + err.message);
                restaurarBoton();
            }
        };

        reader.readAsArrayBuffer(file);
        e.target.value = '';

        function restaurarBoton() {
            lblCargar.innerHTML = "📁 Cargar Archivo Excel";
            lblCargar.style.pointerEvents = 'auto';
        }
    });

    // Sobreescribimos la función de imprimir de ventana nativa 
    // para generar un HTML en una nueva pestaña
    window.print = function() {
        if (!window.turnosActualesImpresion) return;
        
        const turnos = window.turnosActualesImpresion.turnos;
        const horasOrdenadas = window.turnosActualesImpresion.horas;

        let html_content = `
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>Impresión de Turnos</title>
            <style>
                body { font-family: 'Comic Sans MS', cursive, sans-serif; background: white; padding: 20px; }
                .container { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
                .bloque { width: 450px; margin-bottom: 20px; break-inside: avoid; }
                .hora-titulo {
                    background-color: #CCFF00 !important;
                    color: black;
                    font-size: 18px;
                    font-weight: bold;
                    padding: 5px;
                    border-bottom: 2px solid black;
                    -webkit-print-color-adjust: exact;
                    print-color-adjust: exact;
                }
                .fila-turno { display: flex; align-items: flex-start; gap: 15px; padding: 3px 6px; color: #000080; font-size: 14px; font-style: italic; margin-top: 4px; }
                .col-nombre { flex: 1; word-break: break-word; }
                .col-fin { white-space: nowrap; font-weight: bold; flex-shrink: 0; }
                .col-sig { white-space: nowrap; font-weight: bold; flex-shrink: 0; min-width: 90px; }
                .btn-imprimir {
                    padding: 15px 30px; font-size: 18px; font-weight: bold; cursor: pointer;
                    background: #2196F3; color: white; border: none; border-radius: 8px;
                    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                    margin-bottom: 20px;
                }
                .btn-imprimir:hover { background: #0b7dda; }
                @media print {
                    .no-print { display: none !important; }
                    body { padding: 0; }
                }
            </style>
        </head>
        <body>
            <div class="no-print" style="text-align: center;">
                <button class="btn-imprimir" onclick="window.nativePrint()">🖨️ Imprimir o Guardar como PDF</button>
            </div>
            <div class="container">
        `;
        
        horasOrdenadas.forEach(hora => {
            let listaDatos = turnos[hora];
            let cantidad = listaDatos.length;
            
            html_content += \`<div class="bloque">\`;
            html_content += \`<div class="hora-titulo">\${hora} H (\${cantidad} pers.)</div>\`;
            
            listaDatos.forEach(datos => {
                let sig_texto = datos.sig !== "FIN TURNO" ? \`👉 Sig: \${datos.sig}\` : "";
                
                html_content += \`
                    <div class="fila-turno">
                        <div class="col-nombre">🔸 \${datos.nombre}</div>
                        <div class="col-fin">Fin: \${datos.fin}</div>
                        <div class="col-sig">\${sig_texto}</div>
                    </div>
                \`;
            });
            html_content += \`</div>\`;
        });

        html_content += `
            </div>
            <script>
                window.nativePrint = function() { window.print(); }
            <\/script>
        </body>
        </html>
        `;

        const newWin = window.open('', '_blank');
        newWin.document.write(html_content);
        newWin.document.close();
    };
</script>

</body>
</html>
